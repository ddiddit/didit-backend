spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

logging:
  level:
    root: INFO
    org.springframework.test.context: DEBUG
jwt:
  secret: dummy-jwt-secret
  access-token-expiration: 6000
  refresh-token-expiration: 6000

oauth:
  apple:
    client-id: dummy-apple-client-id
  google:
    client-id: dummy-google-client-id
