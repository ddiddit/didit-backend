spring:
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:mysql://didit-prod-db:3306/didit?serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    time-zone: UTC

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  tomcat:
    mbeanregistry:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

firebase:
  service-account-path: /home/didit-prod/didit/firebase/firebase-service-account.json

jwt:
  secret: ${JWT_SECRET}

admin:
  cors:
    allowed-origins: ${ADMIN_CORS_ALLOWED_ORIGINS}
  invite:
    base-url: ${ADMIN_INVITE_BASE_URL}
