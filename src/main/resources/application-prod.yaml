spring:
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:mysql://didit-prod-db:3306/didit?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never

firebase:
  service-account-path: /home/didit-prod/didit/firebase/firebase-service-account.json

jwt:
  secret: ${JWT_SECRET}

admin:
  cors:
    allowed-origins: ${ADMIN_CORS_ALLOWED_ORIGINS}
  invite:
    base-url: ${ADMIN_INVITE_BASE_URL}