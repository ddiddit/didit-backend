<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 초대 — didit</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f5f5f5;padding:40px 0;">
  <tr>
    <td align="center">
      <table width="520" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;width:100%;">

        <tr>
          <td style="background-color:#3DDB99;border-radius:12px 12px 0 0;padding:24px 36px;">
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="vertical-align:middle;padding-right:12px;">
                  <img src="cid:logo" width="44" height="44" alt="didit" style="display:block;border-radius:10px;" />
                </td>
                <td style="vertical-align:middle;">
                  <div style="font-size:20px;font-weight:700;color:#111111;letter-spacing:-0.02em;">didit</div>
                  <div style="font-size:12px;color:#0a6644;margin-top:2px;">AI 업무 회고 서비스</div>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <tr>
          <td style="background-color:#ffffff;border-radius:0 0 12px 12px;padding:40px 36px 36px;">

            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
              <tr>
                <td style="vertical-align:top;padding-right:14px;">
                  <img src="cid:character" width="52" height="52" alt="didit AI" style="display:block;border-radius:12px;" />
                </td>
                <td style="vertical-align:top;background-color:#f2fdf8;border:1px solid #d0f4e6;border-radius:0 12px 12px 12px;padding:14px 18px;">
                    <span style="font-size:14px;color:#333333;line-height:1.7;">
                      안녕하세요!<br />
                      <strong style="color:#111111;font-weight:700;">didit 관리자</strong>로 초대받으셨어요.<br />
                      아래 버튼으로 계정을 바로 만들어보세요.
                    </span>
                </td>
              </tr>
            </table>

            <div style="height:1px;background-color:#f0f0f0;margin-bottom:24px;"></div>

            <p style="margin:0 0 8px 0;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#3DDB99;">Admin Invitation</p>

            <h1 style="margin:0 0 12px 0;font-size:22px;font-weight:700;color:#111111;line-height:1.4;letter-spacing:-0.02em;">관리자 계정을<br>생성해주세요</h1>

            <p style="margin:0 0 28px 0;font-size:15px;color:#555555;line-height:1.8;">
              회원님을 didit 관리자로 초대합니다.<br>
              버튼을 클릭하면 계정 생성 페이지로 이동합니다.
            </p>

            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:20px;">
              <tr>
                <td align="center" style="background-color:#3DDB99;border-radius:8px;">
                  <a href="{baseUrl}/admin/register?token={token}" style="display:block;padding:16px;font-size:15px;font-weight:700;color:#111111;text-decoration:none;text-align:center;letter-spacing:-0.01em;">
                    계정 생성하기 →
                  </a>
                </td>
              </tr>
            </table>

            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="vertical-align:middle;padding-right:8px;">
                  <div style="width:6px;height:6px;border-radius:50%;background-color:#3DDB99;"></div>
                </td>
                <td style="font-size:13px;color:#aaaaaa;">
                  이 링크는 <strong style="color:#333333;">{expiryHours}시간</strong> 후 만료됩니다.
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <tr>
          <td align="center" style="padding-top:20px;font-size:12px;color:#bbbbbb;line-height:1.8;">
            본 메일은 발신 전용입니다.
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>

</body>
</html>
