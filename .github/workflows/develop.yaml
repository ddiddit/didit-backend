name: develop

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

env:
  IMAGE_NAME: ghcr.io/ddiddit/didit-backend:latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  docker-build:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy scripts to NCP dev server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          source: "deploy"
          target: "/home/didit-dev/didit"

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v0.1.6
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          envs: COMMIT_MSG
          script: |
            cd /home/didit-dev/didit

            chmod +x deploy/dev/scripts/*.sh
            chmod +x deploy/shared/*.sh

            cat > deploy/dev/.env << 'ENVEOF'
            SPRING_PROFILES_ACTIVE=dev
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            JWT_SECRET=${{secrets.JWT_SECRET}}
            GOOGLE_CLIENT_ID=${{secrets.GOOGLE_CLIENT_ID}}
            APPLE_CLIENT_ID=${{secrets.APPLE_CLIENT_ID}}
            KAKAO_CLIENT_ID=${{secrets.KAKAO_CLIENT_ID}}
            KAKAO_CLIENT_SECRET=${{secrets.KAKAO_CLIENT_SECRET}}
            ENVEOF

            echo "DEPLOYER=${{ github.actor }}" >> deploy/dev/.env
            printf 'COMMIT_MESSAGE=%s\n' "$(echo "$COMMIT_MSG" | head -1)" >> deploy/dev/.env

            chmod 600 deploy/dev/.env

            mkdir -p /home/didit-dev/didit/firebase
            cat > /home/didit-dev/didit/firebase/firebase-service-account.json << 'FBEOF'
            ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
            FBEOF

            ./deploy/dev/scripts/deploy.sh

      - name: Create Deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: development
          ref: ${{ github.sha }}
