name: production

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/ddiddit/didit-backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  docker-build:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy scripts to NCP prod server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "deploy"
          target: "/home/didit-prod/didit"

      - name: Deploy to prod server
        uses: appleboy/ssh-action@v0.1.6
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: COMMIT_MSG
          script: |
            cd /home/didit-prod/didit

            chmod +x deploy/prod/scripts/*.sh
            chmod +x deploy/shared/*.sh

            cat > deploy/prod/.env << 'ENVEOF'
            DB_USER=${{ secrets.PROD_DB_USER }}
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.PROD_DB_ROOT_PASSWORD }}
            DISCORD_WEBHOOK_URL=${{ secrets.PROD_DISCORD_WEBHOOK_URL }}
            DISCORD_MONITOR_WEBHOOK_URL=${{ secrets.PROD_DISCORD_MONITOR_WEBHOOK_URL }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            GMAIL_USERNAME=${{ secrets.GMAIL_USERNAME }}
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            ADMIN_INITIAL_USERNAME=${{ secrets.ADMIN_INITIAL_USERNAME }}
            ADMIN_INITIAL_PASSWORD=${{ secrets.ADMIN_INITIAL_PASSWORD }}
            ADMIN_INVITE_BASE_URL=${{ secrets.PROD_ADMIN_INVITE_BASE_URL }}
            ADMIN_CORS_ALLOWED_ORIGINS=${{ secrets.PROD_CORS_ALLOWED_ORIGINS }}
            CLOVA_API_KEY=${{ secrets.CLOVA_API_KEY }}
            CLOVA_SPEECH_INVOKE_URL=${{ secrets.CLOVA_SPEECH_INVOKE_URL }}
            CLOVA_SPEECH_SECRET_KEY=${{ secrets.CLOVA_SPEECH_SECRET_KEY }}
            RETROSPECTIVE_WHITELIST_EMAILS=${{secrets.RETROSPECTIVE_WHITELIST_EMAILS}}
            ENVEOF

            echo "DEPLOYER=${{ github.actor }}" >> deploy/prod/.env
            printf 'COMMIT_MESSAGE=%s\n' "$(echo "$COMMIT_MSG" | head -1)" >> deploy/prod/.env
            echo "GIT_SHA=${{ github.sha }}" >> deploy/prod/.env

            chmod 600 deploy/prod/.env

            mkdir -p /home/didit-prod/didit/firebase
            cat > /home/didit-prod/didit/firebase/firebase-service-account.json << 'FBEOF'
            ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
            FBEOF

            ./deploy/prod/scripts/deploy.sh

      - name: Create Deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          ref: ${{ github.sha }}
