services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: didit-prometheus
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - didit-network

  grafana:
    image: grafana/grafana:11.3.1
    container_name: didit-grafana
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - didit-network

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: didit-node-exporter
    restart: always
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - "--path.rootfs=/host"
    networks:
      - didit-network

networks:
  didit-network:
    external: true

volumes:
  prometheus-data:
  grafana-data: