apiVersion: 1

policies:
  - orgId: 1
    receiver: discord-monitor-critical
    group_by:
      - grafana_folder
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: discord-monitor-critical
        object_matchers:
          - [ 'severity', '=', 'critical' ]
        continue: false

      - receiver: discord-monitor-critical
        object_matchers:
          - [ 'severity', '=', 'warning' ]
        mute_time_intervals:
          - mute-always
        continue: false

muteTimes:
  - orgId: 1
    name: mute-always
    time_intervals:
      - {}
