global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: didit-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - didit-api-blue:8080
          - didit-api-green:8080

  - job_name: didit-exporter
    static_configs:
      - targets:
          - node-exporter:9100