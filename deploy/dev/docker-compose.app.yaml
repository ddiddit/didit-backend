services:
  didit-api:
    image: ghcr.io/ddiddit/didit-backend:latest
    container_name: didit-api
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - didit-network
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"

networks:
  didit-network:
    external: true