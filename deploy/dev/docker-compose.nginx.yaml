services:
  didit-nginx:
    image: nginx:latest
    container_name: didit-nginx
    restart: always
    networks:
      - didit-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

networks:
  didit-network:
    external: true